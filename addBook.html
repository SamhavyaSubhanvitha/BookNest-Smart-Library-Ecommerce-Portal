<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#d7e8f5;
}

.container{
width:400px;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,0.6);
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:25px;
border:none;
border-radius:25px;
background:#222;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#444;
}

.links{
margin-top:20px;
text-align:center;
}

.links a{
display:block;
text-decoration:none;
color:#555;
margin:8px 0;
}

.links a:hover{
color:black;
}

</style>

</head>
<body>
    <div class="container">
        <h1>Add Book Page</h1>
        <label for="name">Name:</label>
        <input type="name" id="nameIp">
        <label for="price">Price:</label>
        <input type="price" id="priceip">
        <label for="status">Status:</label>
        <input type="status" id="statusip">
        <br>
        <div class="links">
            <a href="index.html">Added Book information then redirecting to home page</a>
            <br>
            <a href="taken.html">Take the Book</a>
            <br>
            <a href="return.html">Return Book</a>
            <br>
            <a href="delete.html">Delete the Book</a>
            <br>
            <button onclick="submitForm()">Submit</button>  
        </div>
    </div>
<script>
    if(sessionStorage.getItem("loggedIn")!=="true"){
        alert("Please sign in first");
        window.location.href="signin.html";
}
    async function submitForm(){
        console.log("called function");
        const userName=document.getElementById("nameIp").value;
        console.log(userName);
        const userPrice=document.getElementById("priceip").value;
        console.log(userPrice);
        const userStatus=document.getElementById("statusip").value;
        console.log(userStatus);
        const options = {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "name": userName,
                "price": userPrice,
                "status":userStatus
            })
        };

        try {
            const res = await fetch("http://localhost:3000/addBook", options);
            console.log("the response", res);
            
            const data = await res.text();
            alert(data); 
            if(data !== "this book is not available"){
                window.location.href="index.html";
            }
        } catch (error) {
            console.error("Error during adding book:", error);
        }
    }
</script>
</body>
</html>
