<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in</title>
    <style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#d7e8f5;
}

.container{
width:400px;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,0.6);
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:25px;
border:none;
border-radius:25px;
background:#222;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#444;
}

.links{
margin-top:20px;
text-align:center;
}

.links a{
display:block;
text-decoration:none;
color:#555;
margin:8px 0;
}

.links a:hover{
color:black;
}

</style>
</head>
<body>
    <div class="container">
        <h1>Sign-in Page</h1>
        <label for="email">Email:</label>
        <input type="email" id="emailIp">
        <label for="password">Password:</label>
        <input type="password" id="passip">
        <br>
        <div class="links">
            <a href="signup.html">Do not have an account signup</a>
            <button onclick="submitForm()">Sign-in</button>
        </div>
    </div>  
<script>
    async function submitForm(){
        console.log("called function");
        const userEmail=document.getElementById("emailIp").value;
        console.log(userEmail);
        const userPassword=document.getElementById("passip").value;
        console.log(userPassword);
        const sendBody = JSON.stringify({
            "email":userEmail,
            "password":userPassword
        });
        console.log("the body is:",sendBody);

        try{
            const res = await fetch("http://localhost:3000/signin",{
                method:"POST",
                headers:{
                    "Content-type":"application/json"
                },
                body:sendBody
            });
            console.log("the response",res.status);
            if(res.status==404){
                alert("Account doesnot exist. Please sign up first.");
                return;
            }
            const responseData = await res.text();
            alert(responseData);
            sessionStorage.setItem("loggedIn","true");
            window.location.href="index.html";
        }catch (error) {
            console.error("error during fetch:",error);
        }
    }
</script>

</body>
</html>
