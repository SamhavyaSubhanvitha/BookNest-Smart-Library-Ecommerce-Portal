<!DOCTYPE html>
<html>

<head>

<title>Author Login</title>

<link rel="stylesheet" href="style.css">

<style>

.login-box{

width:350px;
margin:100px auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
background:white;

}

.login-box h2{

text-align:center;

}

.login-box input{

width:100%;
padding:10px;
margin:10px 0;

}

.login-box button{

width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Author Login</h2>

<input
type="email"
id="authorEmail"
placeholder="Author Email">

<input
type="password"
id="authorPassword"
placeholder="Password">

<button onclick="authorLogin()">

Login

</button>

</div>

<script src="script.js"></script>

</body>

</html>
